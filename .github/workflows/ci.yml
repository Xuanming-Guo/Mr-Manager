name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Check public repository tree
        run: npm run repo:check
      - name: Check branch policy
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: npm run branch:check

  frontend:
    name: Frontend checks
    needs: repository-policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Run unit tests
        run: npm run test:run
      - name: Build frontend
        run: npm run build

  browser-smoke:
    name: Browser smoke
    needs: repository-policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke test
        run: npm run test:e2e

  rust:
    name: Rust and Tauri checks
    needs: repository-policy
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.88.0 --profile minimal --component rustfmt,clippy
      - name: Cache Cargo data
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-1.88-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-1.88-
      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features --locked
      - name: Build unsigned debug executable
        run: npm run tauri build -- --debug --no-bundle
      - name: Validate executable locator
        run: npm run app:open -- -PrintPath
