name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Run unit tests
        run: npm run test:run
      - name: Build frontend
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke test
        run: npm run test:e2e

  rust:
    name: Rust and Tauri checks
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.88.0 --profile minimal --component rustfmt,clippy
      - name: Select pinned Rust toolchain
        run: rustup default 1.88.0
      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features
      - name: Build unsigned debug executable
        run: npm run tauri build -- --debug --no-bundle
